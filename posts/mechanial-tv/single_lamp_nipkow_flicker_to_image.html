<div style="padding: 0.5rem 0;">
<h2 class="sr-only">Interactive diagram: a single flickering lamp behind a spinning Nipkow disc, where increasing the disc speed turns a crawling dot into a steady image through persistence of vision.</h2>
<svg id="fl" width="100%" viewBox="0 0 680 500" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>One flickering lamp behind a spinning Nipkow disc forming an image</title>
  <desc>A single lamp's brightness varies over time; a spinning disc places each flash at a new spot in a small window, and at high speed persistence of vision fuses them into a face.</desc>

  <text class="ts" x="410" y="118" text-anchor="middle">what your eye sees</text>
  <g id="disc">
    <circle cx="410" cy="300" r="178" fill="var(--color-background-secondary)" stroke="var(--color-border-secondary)" stroke-width="0.5"/>
    <circle cx="410" cy="300" r="6" fill="var(--color-border-secondary)"/>
    <path id="spiral" fill="none" stroke="var(--color-border-secondary)" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.6"/>
    <g id="holes"></g>
  </g>
  <rect x="349" y="127" width="122" height="90" rx="3" fill="#0c0b09" stroke="#FCDE5A" stroke-width="1.5"/>
  <g id="cells"></g>
  <circle id="spotGlow" r="12" fill="#EF9F27" opacity="0"/>
  <circle id="spot" r="5" fill="#FCDE5A" opacity="0"/>
  <text class="ts" x="410" y="494" text-anchor="middle">spinning Nipkow disc</text>

  <circle id="bulbGlow" cx="135" cy="250" r="26" fill="#FAC775" opacity="0"/>
  <circle id="bulb" cx="135" cy="250" r="16" fill="rgb(60,55,42)" stroke="var(--color-border-secondary)" stroke-width="0.5"/>
  <rect x="128" y="264" width="14" height="9" rx="1.5" fill="var(--color-border-secondary)"/>
  <text class="ts" x="135" y="300" text-anchor="middle">one lamp, flickering</text>
  <line id="beam" x1="151" y1="250" x2="410" y2="170" stroke="#FAC775" stroke-width="1.5" opacity="0"/>

  <text class="ts" x="136" y="348" text-anchor="middle">the signal: brightness over time</text>
  <rect x="36" y="356" width="200" height="66" rx="4" fill="#15140f" stroke="var(--color-border-secondary)" stroke-width="0.5"/>
  <polyline id="trace" points="" fill="none" stroke="#F2A623" stroke-width="1.4"/>
</svg>

<div style="margin-top:14px; display:flex; align-items:center; gap:14px; font-size:13px; color:var(--color-text-secondary);">
  <button id="pp" style="min-width:84px;">Pause</button>
  <span>Disc speed</span>
  <input id="spd" type="range" min="0.15" max="25" step="0.05" value="1" style="flex:1;">
</div>
<div style="margin-top:12px; display:grid; grid-template-columns:repeat(3,1fr); gap:12px;">
  <div style="background:var(--color-background-secondary); border-radius:var(--border-radius-md); padding:10px 12px;">
    <div style="font-size:12px; color:var(--color-text-secondary);">frames / sec</div>
    <div id="mfps" style="font-size:22px; font-weight:500;">1.0</div>
  </div>
  <div style="background:var(--color-background-secondary); border-radius:var(--border-radius-md); padding:10px 12px;">
    <div style="font-size:12px; color:var(--color-text-secondary);">flashes / sec</div>
    <div id="mfl" style="font-size:22px; font-weight:500;">80</div>
  </div>
  <div style="background:var(--color-background-secondary); border-radius:var(--border-radius-md); padding:10px 12px;">
    <div style="font-size:12px; color:var(--color-text-secondary);">disc rpm</div>
    <div id="mrpm" style="font-size:22px; font-weight:500;">60</div>
  </div>
</div>
<div id="cap" style="margin-top:12px; font-size:14px; font-weight:500; color:var(--color-text-primary);">Slow enough to watch — it is just one dot, flickering.</div>
</div>

<script>
(function(){
  var NS="http://www.w3.org/2000/svg";
  var cols=10, rows=8, total=cols*rows;
  var dcx=410, dcy=300, Rout=172, Rin=84;
  var winX=350, winY=128, cw=12, ch=11;
  var SCENE=["3333333333","3399999933","3990990993","3999999993","3990000993","3999999993","3399999933","3333333333"];

  var holesG=document.getElementById('holes'), cellsG=document.getElementById('cells'), spiral=document.getElementById('spiral'), disc=document.getElementById('disc');
  var spot=document.getElementById('spot'), spotGlow=document.getElementById('spotGlow');
  var bulb=document.getElementById('bulb'), bulbGlow=document.getElementById('bulbGlow'), beam=document.getElementById('beam');
  var trace=document.getElementById('trace');
  var cap=document.getElementById('cap'), mfps=document.getElementById('mfps'), mfl=document.getElementById('mfl'), mrpm=document.getElementById('mrpm');

  function bright(i){ var r=Math.floor(i/cols), c=i%cols; return parseInt(SCENE[r].charAt(c),10)/9; }
  function pix(b){ return 'rgb('+Math.round(14+231*b)+','+Math.round(12+158*b)+','+Math.round(9+30*b)+')'; }
  function bulbCol(b){ return 'rgb('+Math.round(55+195*b)+','+Math.round(48+187*b)+','+Math.round(34+146*b)+')'; }
  function cellCenter(i){ var r=Math.floor(i/cols), c=i%cols; return [winX+c*cw+cw/2, winY+r*ch+ch/2]; }

  var sp="M";
  for(var i=0;i<rows;i++){
    var rr=Rout-i*(Rout-Rin)/(rows-1), a=i*2*Math.PI/rows;
    var hx=dcx+rr*Math.sin(a), hy=dcy-rr*Math.cos(a);
    sp+=(i?" L":" ")+hx.toFixed(1)+" "+hy.toFixed(1);
    var c=document.createElementNS(NS,"circle");
    c.setAttribute("cx",hx.toFixed(1));c.setAttribute("cy",hy.toFixed(1));c.setAttribute("r","3.5");
    c.setAttribute("fill","var(--color-background-primary)");c.setAttribute("stroke","var(--color-border-secondary)");c.setAttribute("stroke-width","0.5");
    holesG.appendChild(c);
  }
  spiral.setAttribute("d",sp);

  var cellEls=[], disp=[];
  for(var k=0;k<total;k++){
    var r=Math.floor(k/cols), cc=k%cols;
    var rc=document.createElementNS(NS,"rect");
    rc.setAttribute("x",(winX+cc*cw+0.6).toFixed(1));rc.setAttribute("y",(winY+r*ch+0.6).toFixed(1));
    rc.setAttribute("width",(cw-1.2).toFixed(1));rc.setAttribute("height",(ch-1.2).toFixed(1));
    rc.setAttribute("fill",pix(0));
    cellsG.appendChild(rc); cellEls.push(rc); disp.push(0);
  }

  var cellPos=0, processed=0, playing=true, fps=1, last=null, tau=0.16;
  var lampVal=0, lastIdx=0, traceBuf=[];
  var pp=document.getElementById('pp'), spd=document.getElementById('spd');
  pp.addEventListener('click',function(){ playing=!playing; pp.textContent=playing?'Pause':'Play'; if(playing){last=null;requestAnimationFrame(fr);} });
  spd.addEventListener('input',function(){ fps=parseFloat(spd.value); });

  function readouts(){
    mfps.textContent=fps.toFixed(fps<10?1:0);
    mfl.textContent=Math.round(fps*total).toLocaleString();
    mrpm.textContent=Math.round(fps*60).toLocaleString();
    cap.textContent = fps<2.2 ? 'Slow enough to watch — it is just one dot, flickering.'
      : fps<9 ? 'Speeding up — whole lines start to hold together.'
      : 'Too fast to see any flicker — your eye just sees the picture.';
  }
  readouts();

  function fr(t){
    if(last===null)last=t;
    var dt=Math.min((t-last)/1000,0.05); last=t;
    var decay=Math.exp(-dt/tau);
    for(var i=0;i<total;i++){ disp[i]*=decay; }

    if(playing){
      cellPos += fps*total*dt;
      var target=Math.floor(cellPos);
      var guard=0;
      while(processed<target && guard<total*3){
        processed++; guard++;
        var idx=(processed-1)%total;
        var v=bright(idx);
        disp[idx]=v; lampVal=v; lastIdx=idx;
        traceBuf.push(v); if(traceBuf.length>170) traceBuf.shift();
      }
    }

    for(var j=0;j<total;j++){ cellEls[j].setAttribute('fill',pix(disp[j])); }

    var ph=((cellPos/total)%1+1)%1;
    disc.setAttribute('transform','rotate('+(-ph*360)+' '+dcx+' '+dcy+')');

    var sc=cellCenter(lastIdx);
    spot.setAttribute('cx',sc[0].toFixed(1)); spot.setAttribute('cy',sc[1].toFixed(1));
    spot.setAttribute('fill', lampVal>0.4?'#FCDE5A':'#caa94a'); spot.setAttribute('opacity', (0.35+0.65*Math.max(lampVal,0.15)).toFixed(2));
    spotGlow.setAttribute('cx',sc[0].toFixed(1)); spotGlow.setAttribute('cy',sc[1].toFixed(1)); spotGlow.setAttribute('opacity',(0.4*lampVal).toFixed(2));

    bulb.setAttribute('fill',bulbCol(lampVal));
    bulbGlow.setAttribute('opacity',(0.5*lampVal).toFixed(2));
    bulbGlow.setAttribute('r',(20+12*lampVal).toFixed(1));
    beam.setAttribute('x2',sc[0].toFixed(1)); beam.setAttribute('y2',sc[1].toFixed(1));
    beam.setAttribute('opacity',(0.28*lampVal).toFixed(2));

    if(traceBuf.length>1){
      var pts="";
      for(var p=0;p<traceBuf.length;p++){
        pts += (38+p*(196/169)).toFixed(1)+","+(418-traceBuf[p]*60).toFixed(1)+" ";
      }
      trace.setAttribute('points',pts);
    }

    readouts();
    requestAnimationFrame(fr);
  }
  requestAnimationFrame(fr);
})();
</script>
