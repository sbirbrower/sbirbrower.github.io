<div style="padding: 0.5rem 0;">
<h2 class="sr-only">Interactive diagram: a single flickering lamp behind a spinning Nipkow disc whose holes sweep through a curved window; raising the speed fuses the moving dot into a steady image.</h2>
<svg id="fl" width="100%" viewBox="0 0 680 500" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>One flickering lamp behind a spinning Nipkow disc, holes synced to the window</title>
  <desc>A single lamp's brightness varies over time; each spiral hole sweeps through a curved window painting one line, and at speed persistence of vision fuses them into a face.</desc>

  <text class="ts" x="420" y="104" text-anchor="middle">what your eye sees</text>
  <g id="disc">
    <circle cx="420" cy="300" r="188" fill="var(--color-background-secondary)" stroke="var(--color-border-secondary)" stroke-width="0.5"/>
    <circle cx="420" cy="300" r="6" fill="var(--color-border-secondary)"/>
    <path id="spiral" fill="none" stroke="var(--color-border-secondary)" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.55"/>
    <g id="holes"></g>
  </g>
  <path id="screen" d="" fill="#0c0b09"/>
  <path id="screenEdge" d="" fill="none" stroke="#FCDE5A" stroke-width="1.5"/>
  <g id="pixels"></g>
  <circle id="holeRing" r="6" fill="none" stroke="#FAC775" stroke-width="1.5" opacity="0"/>
  <circle id="spotGlow" r="11" fill="#EF9F27" opacity="0"/>
  <circle id="spot" r="4.5" fill="#FCDE5A" opacity="0"/>
  <text class="ts" x="420" y="496" text-anchor="middle">spinning Nipkow disc</text>

  <circle id="bulbGlow" cx="132" cy="250" r="26" fill="#FAC775" opacity="0"/>
  <circle id="bulb" cx="132" cy="250" r="16" fill="rgb(60,55,42)" stroke="var(--color-border-secondary)" stroke-width="0.5"/>
  <rect x="125" y="264" width="14" height="9" rx="1.5" fill="var(--color-border-secondary)"/>
  <text class="ts" x="132" y="300" text-anchor="middle">one lamp, flickering</text>
  <line id="beam" x1="148" y1="250" x2="420" y2="160" stroke="#FAC775" stroke-width="1.5" opacity="0"/>

  <text class="ts" x="135" y="348" text-anchor="middle">the signal: brightness over time</text>
  <rect x="36" y="356" width="200" height="66" rx="4" fill="#15140f" stroke="var(--color-border-secondary)" stroke-width="0.5"/>
  <polyline id="trace" points="" fill="none" stroke="#F2A623" stroke-width="1.4"/>
</svg>

<div style="margin-top:14px; display:flex; align-items:center; gap:14px; font-size:13px; color:var(--color-text-secondary);">
  <button id="pp" style="min-width:84px;">Pause</button>
  <span>Disc speed</span>
  <input id="spd" type="range" min="0.15" max="25" step="0.05" value="1" style="flex:1;">
</div>
<div style="margin-top:12px; display:grid; grid-template-columns:repeat(3,1fr); gap:12px;">
  <div style="background:var(--color-background-secondary); border-radius:var(--border-radius-md); padding:10px 12px;">
    <div style="font-size:12px; color:var(--color-text-secondary);">frames / sec</div>
    <div id="mfps" style="font-size:22px; font-weight:500;">1.0</div>
  </div>
  <div style="background:var(--color-background-secondary); border-radius:var(--border-radius-md); padding:10px 12px;">
    <div style="font-size:12px; color:var(--color-text-secondary);">flashes / sec</div>
    <div id="mfl" style="font-size:22px; font-weight:500;">80</div>
  </div>
  <div style="background:var(--color-background-secondary); border-radius:var(--border-radius-md); padding:10px 12px;">
    <div style="font-size:12px; color:var(--color-text-secondary);">disc rpm</div>
    <div id="mrpm" style="font-size:22px; font-weight:500;">60</div>
  </div>
</div>
<div id="cap" style="margin-top:12px; font-size:14px; font-weight:500; color:var(--color-text-primary);">Slow enough to watch — it is just one dot, flickering.</div>
</div>

<script>
(function(){
  var NS="http://www.w3.org/2000/svg";
  var cols=10, rows=8, total=cols*rows;
  var dcx=420, dcy=300, Rout=176, Rin=112;
  var angHalf=Math.PI/rows, span=2*angHalf;
  var SCENE=["3333333333","3399999933","3990990993","3999999993","3990000993","3999999993","3399999933","3333333333"];

  var holesG=document.getElementById('holes'), pixelsG=document.getElementById('pixels'), spiral=document.getElementById('spiral'), disc=document.getElementById('disc');
  var screen=document.getElementById('screen'), screenEdge=document.getElementById('screenEdge');
  var spot=document.getElementById('spot'), spotGlow=document.getElementById('spotGlow'), holeRing=document.getElementById('holeRing');
  var bulb=document.getElementById('bulb'), bulbGlow=document.getElementById('bulbGlow'), beam=document.getElementById('beam'), trace=document.getElementById('trace');
  var cap=document.getElementById('cap'), mfps=document.getElementById('mfps'), mfl=document.getElementById('mfl'), mrpm=document.getElementById('mrpm');

  function bright(i){ var r=Math.floor(i/cols), c=i%cols; return parseInt(SCENE[r].charAt(c),10)/9; }
  function pix(b){ return 'rgb('+Math.round(14+231*b)+','+Math.round(12+158*b)+','+Math.round(9+30*b)+')'; }
  function bulbCol(b){ return 'rgb('+Math.round(55+195*b)+','+Math.round(48+187*b)+','+Math.round(34+146*b)+')'; }
  function rowR(r){ return Rout - r*(Rout-Rin)/(rows-1); }
  function P(r,a){ return [dcx+r*Math.sin(a), dcy-r*Math.cos(a)]; }
  function cellPosXY(r,cf){ var ang=(cf-0.5)*span; return P(rowR(r),ang); }

  var Ro=Rout+9, Ri=Rin-9, A=angHalf+0.07, dpath="M", n=18;
  for(var s=0;s<=n;s++){ var a=-A+(2*A)*s/n, p=P(Ro,a); dpath+=(s?" L":" ")+p[0].toFixed(1)+" "+p[1].toFixed(1); }
  for(var s2=n;s2>=0;s2--){ var a2=-A+(2*A)*s2/n, p2=P(Ri,a2); dpath+=" L"+p2[0].toFixed(1)+" "+p2[1].toFixed(1); }
  dpath+=" Z";
  screen.setAttribute("d",dpath); screenEdge.setAttribute("d",dpath);

  var sp="M";
  for(var i=0;i<rows;i++){
    var base=-((i+0.5)/rows)*2*Math.PI, p=P(rowR(i),base);
    sp+=(i?" L":" ")+p[0].toFixed(1)+" "+p[1].toFixed(1);
    var c=document.createElementNS(NS,"circle");
    c.setAttribute("cx",p[0].toFixed(1));c.setAttribute("cy",p[1].toFixed(1));c.setAttribute("r","3.6");
    c.setAttribute("fill","none");c.setAttribute("stroke","var(--color-border-secondary)");c.setAttribute("stroke-width","1");
    holesG.appendChild(c);
  }
  spiral.setAttribute("d",sp);

  var pixEls=[], disp=[];
  for(var k=0;k<total;k++){
    var r=Math.floor(k/cols), cc=k%cols, ctr=cellPosXY(r,(cc+0.5)/cols);
    var d=document.createElementNS(NS,"circle");
    d.setAttribute("cx",ctr[0].toFixed(1));d.setAttribute("cy",ctr[1].toFixed(1));d.setAttribute("r","3.8");
    d.setAttribute("fill",pix(0));
    pixelsG.appendChild(d); pixEls.push(d); disp.push(0);
  }

  var cellPos=0, processed=0, playing=true, fps=1, last=null, tau=0.16, lampVal=0, traceBuf=[];
  var pp=document.getElementById('pp'), spd=document.getElementById('spd');
  pp.addEventListener('click',function(){ playing=!playing; pp.textContent=playing?'Pause':'Play'; if(playing){last=null;requestAnimationFrame(fr);} });
  spd.addEventListener('input',function(){ fps=parseFloat(spd.value); });

  function readouts(){
    mfps.textContent=fps.toFixed(fps<10?1:0);
    mfl.textContent=Math.round(fps*total).toLocaleString();
    mrpm.textContent=Math.round(fps*60).toLocaleString();
    cap.textContent = fps<2.2 ? 'Slow enough to watch — it is just one dot, flickering.'
      : fps<9 ? 'Speeding up — whole lines start to hold together.'
      : 'Too fast to see any flicker — your eye just sees the picture.';
  }
  readouts();

  function fr(t){
    if(last===null)last=t;
    var dt=Math.min((t-last)/1000,0.05); last=t;
    var decay=Math.exp(-dt/tau);
    for(var i=0;i<total;i++){ disp[i]*=decay; }

    if(playing){
      cellPos += fps*total*dt;
      var target=Math.floor(cellPos), guard=0;
      while(processed<target && guard<total*3){
        processed++; guard++;
        var idx=(processed-1)%total, v=bright(idx);
        disp[idx]=v;
        traceBuf.push(v); if(traceBuf.length>170) traceBuf.shift();
      }
    }
    for(var j=0;j<total;j++){ pixEls[j].setAttribute('fill',pix(disp[j])); }

    var ph=((cellPos/total)%1+1)%1;
    disc.setAttribute('transform','rotate('+(ph*360)+' '+dcx+' '+dcy+')');
    var row=Math.floor(ph*rows)%rows, cf=ph*rows-Math.floor(ph*rows), col=Math.min(cols-1,Math.floor(cf*cols));
    lampVal=bright(row*cols+col);
    var sxy=cellPosXY(row,cf);

    spot.setAttribute('cx',sxy[0].toFixed(1)); spot.setAttribute('cy',sxy[1].toFixed(1));
    spot.setAttribute('fill', lampVal>0.4?'#FCDE5A':'#caa94a'); spot.setAttribute('opacity', (0.4+0.6*Math.max(lampVal,0.18)).toFixed(2));
    spotGlow.setAttribute('cx',sxy[0].toFixed(1)); spotGlow.setAttribute('cy',sxy[1].toFixed(1)); spotGlow.setAttribute('opacity',(0.42*lampVal).toFixed(2));
    holeRing.setAttribute('cx',sxy[0].toFixed(1)); holeRing.setAttribute('cy',sxy[1].toFixed(1)); holeRing.setAttribute('opacity','0.9');

    bulb.setAttribute('fill',bulbCol(lampVal));
    bulbGlow.setAttribute('opacity',(0.5*lampVal).toFixed(2)); bulbGlow.setAttribute('r',(20+12*lampVal).toFixed(1));
    beam.setAttribute('x2',sxy[0].toFixed(1)); beam.setAttribute('y2',sxy[1].toFixed(1)); beam.setAttribute('opacity',(0.26*lampVal).toFixed(2));

    if(traceBuf.length>1){
      var pts="";
      for(var p=0;p<traceBuf.length;p++){ pts += (38+p*(196/169)).toFixed(1)+","+(418-traceBuf[p]*60).toFixed(1)+" "; }
      trace.setAttribute('points',pts);
    }
    readouts();
    requestAnimationFrame(fr);
  }
  requestAnimationFrame(fr);
})();
</script>
