<div style="padding: 0.5rem 0;">
<h2 class="sr-only">Interactive diagram showing brightness at the camera converted to a voltage signal and back into lamp brightness at the receiver, with a synchronization control that rolls the image when the two machines fall out of step.</h2>
<svg id="sig" width="100%" viewBox="0 0 680 430" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Signal translation and synchronization between camera and receiver</title>
  <desc>The scanning spot's brightness is read by a photocell into a voltage trace, sent to the receiver, and turned back into lamp brightness. Two dials show the camera and receiver turning in step; an offset makes the picture roll.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text class="th" x="100" y="66" text-anchor="middle">at the camera</text>
  <rect x="29" y="83" width="142" height="114" rx="4" fill="#111" stroke="var(--color-border-secondary)" stroke-width="0.5"/>
  <g id="scene"></g>
  <circle id="spotTX" cx="0" cy="0" r="8" fill="none" stroke="#FCDE5A" stroke-width="2" opacity="0"/>
  <text class="ts" x="100" y="212" text-anchor="middle">scene, scanned point by point</text>

  <line x1="172" y1="140" x2="190" y2="146" stroke="#FCDE5A" stroke-width="1.5" opacity="0.8"/>
  <circle cx="201" cy="148" r="11" fill="var(--color-background-secondary)" stroke="var(--color-border-secondary)" stroke-width="0.5"/>
  <circle cx="201" cy="148" r="4" fill="var(--color-text-secondary)"/>
  <text class="ts" x="201" y="124" text-anchor="middle">photocell</text>

  <text class="th" x="320" y="66" text-anchor="middle">the signal</text>
  <rect x="232" y="83" width="178" height="92" rx="6" fill="#15140f" stroke="var(--color-border-secondary)" stroke-width="0.5"/>
  <line x1="240" y1="129" x2="402" y2="129" stroke="#555" stroke-width="0.5"/>
  <polyline id="trace" points="" fill="none" stroke="#F2A623" stroke-width="1.5"/>
  <circle id="now" cx="402" cy="129" r="3" fill="#FCDE5A" opacity="0"/>
  <text class="ts" x="320" y="193" text-anchor="middle">brightness becomes a voltage</text>

  <line x1="213" y1="148" x2="231" y2="140" stroke="var(--color-text-secondary)" stroke-width="1"/>
  <line x1="410" y1="130" x2="468" y2="140" class="arr" marker-end="url(#arrow)"/>
  <text class="ts" x="440" y="120" text-anchor="middle">video</text>

  <text class="th" x="545" y="66" text-anchor="middle">at the receiver</text>
  <rect x="474" y="83" width="142" height="114" rx="4" fill="#15140f" stroke="var(--color-border-secondary)" stroke-width="0.5"/>
  <g id="lamps"></g>
  <circle id="spotRX" cx="0" cy="0" r="8" fill="none" stroke="#FCDE5A" stroke-width="2" opacity="0"/>
  <text class="ts" x="545" y="212" text-anchor="middle">lamps glow to match</text>

  <text class="th" x="340" y="256" text-anchor="middle">keeping them in step</text>

  <circle cx="165" cy="332" r="40" fill="var(--color-background-secondary)" stroke="var(--color-border-secondary)" stroke-width="0.5"/>
  <circle cx="165" cy="332" r="4" fill="var(--color-border-secondary)"/>
  <g id="dialTX"><line x1="165" y1="332" x2="165" y2="296" stroke="var(--color-text-primary)" stroke-width="2.5" stroke-linecap="round"/></g>
  <text class="ts" x="165" y="392" text-anchor="middle">camera disc</text>

  <circle cx="515" cy="332" r="40" fill="var(--color-background-secondary)" stroke="var(--color-border-secondary)" stroke-width="0.5"/>
  <circle cx="515" cy="332" r="4" fill="var(--color-border-secondary)"/>
  <g id="dialRX"><line x1="515" y1="332" x2="515" y2="296" stroke="var(--color-text-primary)" stroke-width="2.5" stroke-linecap="round"/></g>
  <text class="ts" x="515" y="392" text-anchor="middle">receiver brush</text>

  <line x1="207" y1="332" x2="473" y2="332" stroke="var(--color-border-secondary)" stroke-width="0.5" stroke-dasharray="4 4"/>
  <text class="ts" x="340" y="326" text-anchor="middle">driven in common</text>
  <text id="status" class="th" x="340" y="356" text-anchor="middle">locked — picture holds steady</text>
</svg>

<div style="display:flex; flex-wrap:wrap; align-items:center; gap:12px 16px; margin-top:14px; font-size:13px; color:var(--color-text-secondary);">
  <button id="pp" style="min-width:84px;"><i class="ti ti-player-pause" aria-hidden="true"></i> Pause</button>
  <span>Speed</span>
  <input id="spd" type="range" min="0.3" max="3" step="0.1" value="1" style="width:90px;">
  <span style="flex-basis:100%; height:0;"></span>
  <span>Receiver timing</span>
  <input id="off" type="range" min="-18" max="18" step="1" value="0" style="flex:1; min-width:140px;">
  <span id="offv" style="min-width:64px; text-align:right;">in sync</span>
  <button id="resync"><i class="ti ti-refresh" aria-hidden="true"></i> Re-sync</button>
</div>
</div>

<script>
(function(){
  var SVGNS="http://www.w3.org/2000/svg";
  var Cc=10, Rr=8, total=Cc*Rr;
  var SCENE=["3333333333","3399999933","3990990993","3999999993","3990000993","3999999993","3399999933","3333333333"];

  var sceneG=document.getElementById('scene');
  var lampsG=document.getElementById('lamps');
  var trace=document.getElementById('trace');
  var spotTX=document.getElementById('spotTX');
  var spotRX=document.getElementById('spotRX');
  var nowDot=document.getElementById('now');
  var dialTX=document.getElementById('dialTX');
  var dialRX=document.getElementById('dialRX');
  var statusEl=document.getElementById('status');

  var sox=29, soy=83, scw=14.2, sch=14.25;
  var lox=474, loy=83, lcw=14.2, lch=14.25;

  function bright(i){ var r=Math.floor(i/Cc), c=i%Cc; return parseInt(SCENE[r].charAt(c),10)/9; }
  function sceneCenter(i){ var r=Math.floor(i/Cc), c=i%Cc; return [sox+c*scw+scw/2, soy+r*sch+sch/2]; }
  function lampCenter(i){ var r=Math.floor(i/Cc), c=i%Cc; return [lox+c*lcw+lcw/2, loy+r*lch+lch/2]; }
  function gray(b){ var v=Math.round(20+b*225); return 'rgb('+v+','+v+','+v+')'; }
  function amber(b){ return 'rgb('+Math.round(28+214*b)+','+Math.round(26+140*b)+','+Math.round(22+13*b)+')'; }

  var lampEls=[];
  for(var i=0;i<total;i++){
    var r=Math.floor(i/Cc), c=i%Cc;
    var rc=document.createElementNS(SVGNS,"rect");
    rc.setAttribute("x",(sox+c*scw).toFixed(2)); rc.setAttribute("y",(soy+r*sch).toFixed(2));
    rc.setAttribute("width",scw.toFixed(2)); rc.setAttribute("height",sch.toFixed(2));
    rc.setAttribute("fill",gray(bright(i)));
    sceneG.appendChild(rc);

    var lc=lampCenter(i);
    var l=document.createElementNS(SVGNS,"circle");
    l.setAttribute("cx",lc[0].toFixed(2)); l.setAttribute("cy",lc[1].toFixed(2)); l.setAttribute("r","5");
    l.setAttribute("fill",amber(0));
    lampsG.appendChild(l);
    lampEls.push(l);
  }

  var pos=0, processed=0, playing=true, speed=1, offsetCells=0, last=null;
  var traceBuf=[];
  var pp=document.getElementById('pp');
  var spd=document.getElementById('spd');
  var off=document.getElementById('off');
  var offv=document.getElementById('offv');
  var resync=document.getElementById('resync');

  pp.addEventListener('click',function(){
    playing=!playing;
    pp.innerHTML = playing ? '<i class="ti ti-player-pause"></i> Pause' : '<i class="ti ti-player-play"></i> Play';
    if(playing){ last=null; requestAnimationFrame(frame); }
  });
  spd.addEventListener('input',function(){ speed=parseFloat(spd.value); });
  off.addEventListener('input',function(){ offsetCells=parseInt(off.value,10); updateStatus(); });
  resync.addEventListener('click',function(){ offsetCells=0; off.value=0; updateStatus(); });

  function updateStatus(){
    if(offsetCells===0){ offv.textContent='in sync'; statusEl.textContent='locked — picture holds steady'; statusEl.setAttribute('fill','var(--color-text-primary)'); }
    else { offv.textContent=(offsetCells>0?'+':'')+offsetCells+' cells'; statusEl.textContent='out of step — the picture rolls'; statusEl.setAttribute('fill','#BA7517'); }
  }
  updateStatus();

  function frame(t){
    if(last===null) last=t;
    var dt=(t-last)/1000; last=t;
    if(playing) pos += dt*0.18*speed*total;

    var target=Math.floor(pos);
    var lastTxi=0, lastB=0, lastRxi=0, any=false;
    while(processed < target){
      processed++;
      var txi=(processed-1)%total;
      var b=bright(txi);
      var rxi=((txi-offsetCells)%total+total)%total;
      lampEls[rxi].setAttribute('fill',amber(b));
      traceBuf.push(b); if(traceBuf.length>90) traceBuf.shift();
      lastTxi=txi; lastB=b; lastRxi=rxi; any=true;
    }

    var ph=(pos/total);
    var deg=(ph*360)%360;
    dialTX.setAttribute('transform','rotate('+deg+' 165 332)');
    var degRx=deg - (offsetCells/total)*360;
    dialRX.setAttribute('transform','rotate('+degRx+' 515 332)');

    if(traceBuf.length>1){
      var pts="";
      for(var j=0;j<traceBuf.length;j++){
        var x=240 + j*(162/89);
        var y=170 - traceBuf[j]*40;
        pts += x.toFixed(1)+","+y.toFixed(1)+" ";
      }
      trace.setAttribute('points',pts);
      nowDot.setAttribute('cx','402'); nowDot.setAttribute('cy',(170-lastB*40).toFixed(1)); nowDot.setAttribute('opacity','1');
    }

    if(any){
      var sc=sceneCenter(lastTxi);
      spotTX.setAttribute('cx',sc[0].toFixed(1)); spotTX.setAttribute('cy',sc[1].toFixed(1)); spotTX.setAttribute('opacity','1');
      var lc=lampCenter(lastRxi);
      spotRX.setAttribute('cx',lc[0].toFixed(1)); spotRX.setAttribute('cy',lc[1].toFixed(1)); spotRX.setAttribute('opacity','1');
    }

    if(playing) requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
